project:
  type: website
  output-dir: _site
  render:
    - "index.qmd"
    - "jupyterlite.qmd"
    - "tracks-overview.qmd"
    - "downloads.qmd"
    - "setup.qmd"
    - "intro/*.qmd"
    - "tracks/**/*.qmd"
    - "sitedocs/*.md"
  resources:
    - files/**
    - shared/**
    - jupyterlite/**

website:
  title: "CS Quest Adventures"
  description: "Epic journeys through Computer Science - Learn Python, Rust, Game Dev, and more!"
  
  navbar:
    background: primary
    search: true
    left:
      - text: "🏰 Home"
        file: index.qmd
      - text: "🌟 Getting Started"
        menu:
          - text: "What is CS?"
            file: intro/what-is-cs.qmd
          - text: "Why Study CS?"
            file: intro/why-study-cs.qmd
          - text: "Try It Now!"
            file: intro/try-it-now.qmd
          - text: "---"
          - text: "College Fair Guide"
            file: intro/college-fair.qmd
      - text: "Learning Tracks"
        menu:
          - text: "🐍 Python Track"
            file: tracks/python/index.qmd
          - text: "🦀 Rust Track"
            file: tracks/rust/index.qmd
          - text: "🎮 Pygame Track"
            file: tracks/pygame/index.qmd
          - text: "---"
          - text: "📚 All Tracks Overview"
            file: tracks-overview.qmd
      - text: "Resources"
        menu:
          - text: "📥 Downloads"
            file: downloads.qmd
          - text: "🚀 JupyterLite (Python)"
            file: jupyterlite.qmd
          - text: "🔧 Setup Guides"
            file: setup.qmd
          - text: "❓ FAQ"
            file: sitedocs/faq.md
    right:
      - icon: github
        href: https://github.com/obonhamcarter/CS_Quest_Adventures
  
