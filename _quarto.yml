format:
  live-html:
    theme: 
      - cosmo
      - custom.scss
    css: styles.css
    include-in-header:
      - theme-toggle.js
    toc: true
    toc-depth: 2
    code-copy: true
    code-tools: true
    smooth-scroll: true
    fontsize: 1.1em
    linestretch: 1.7
    fig-cap-location: bottom
    pyodide:
      cell-options:
        edit: true
        runbutton: true
        startover: true
    
execute:
  freeze: auto
  echo: true
  warning: false
  message: false
